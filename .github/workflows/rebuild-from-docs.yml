name: Rebuild from docs

on:
  repository_dispatch:
    types: [docs-updated]
  workflow_dispatch: {}   # allows manual testing from the Actions tab

permissions:
  contents: write

jobs:
  pull-build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jaysync-lab-site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sparse-checkout docs/ from JaySync-Lab
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/JaySync-Lab/JaySync-Lab.git docs-source
          cd docs-source
          git sparse-checkout set docs

      - name: Replace content/ with freshly pulled docs
        run: |
          rm -rf content
          cp -r docs-source/docs content
          rm -rf docs-source

      - name: Filter out draft pages
        run: node scripts/filter-drafts.mjs

      - name: Record source commit for traceability
        run: |
          SOURCE_SHA=$(git ls-remote https://github.com/JaySync-Lab/JaySync-Lab.git main | cut -f1)
          echo "{\"sourceCommit\": \"$SOURCE_SHA\", \"builtAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > content/_build-info.json

      - name: Install dependencies
        run: npm ci

      - name: Pre-flight build (gate two — must pass before anything is committed)
        run: npm run build

      - name: Check for actual content changes
        id: diff
        run: |
          if git diff --quiet -- content; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated content
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content
          git commit -m "docs: sync content from JaySync-Lab"
          git push

      - name: No changes to deploy
        if: steps.diff.outputs.changed == 'false'
        run: echo "Docs pulled successfully but produced no content diff — nothing to commit."
