<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#080808"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <!-- J — large, dominant, left-center -->
  <text
    x="12" y="22"
    text-anchor="middle"
    font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace"
    font-weight="700"
    font-size="18"
    fill="white"
  >J</text>
  <!-- S — small subscript, lower-right -->
  <text
    x="24" y="28"
    text-anchor="middle"
    font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace"
    font-weight="700"
    font-size="10"
    fill="#52525b"
  >S</text>
</svg>
