# Single source of truth for the lab's hardware/service inventory.
#
# This file feeds TWO consumers automatically — do not hand-edit copies
# elsewhere:
#   1. This repo's own docs.
#   2. jaysync-lab-site's data layer (src/data/inventory.yaml) — pulled by
#      its rebuild-from-docs pipeline alongside docs/, so the homepage,
#      /architecture, and /services pages always reflect this file. A push
#      here that touches inventory.yaml triggers a site rebuild (see
#      .github/workflows/validate-and-dispatch.yml).
#
# Keep it accurate; it is what the public site displays.

host:
  model: "HP ProDesk 400 G3"
  cpu: "Intel i5-6500"
  ram_gb: 16
  storage:
    ssd_gb: 512
    vault_tb: 1
  proxmox_version: "9.2"
  uptime_target_pct: 99.9
  services_summary: "Pi-hole, Home Assistant, GPU-passthrough media streaming"

hardware:
  - id: zte-router
    name: "ZTE Router"
    ip: "192.168.1.1"
    type: hardware
    role: "Gateway / DHCP Server"
    vmid: null

  - id: proxmox-host
    name: "Proxmox Host"
    ip: "192.168.1.100"
    type: bare-metal
    role: "Hypervisor — Management UI (port 8006)"
    vmid: null
    docs: infrastructure/hardware.md

nodes:
  - vmid: 100
    name: pi-hole
    type: lxc
    ip: "192.168.1.101"
    role: "Network-wide DNS resolver & ad blocking"
    status_name: "Pi-hole"
    docs: services/pi-hole/README.md
    band: core-network

  - vmid: 101
    name: uptime-kuma
    type: lxc
    ip: "192.168.1.102"
    role: "Infrastructure Observability (The Watchman)"
    status_name: "Uptime Kuma"
    docs: services/uptime-kuma/README.md
    band: core-network

  - vmid: 103
    name: home-assistant
    type: vm
    ip: "192.168.1.11"
    role: "Smart Home OS (HAOS)"
    status_name: "Home Assistant"
    docs: services/home-assistant/README.md
    band: specialized-controllers

  - vmid: 104
    name: media-stack
    type: lxc
    ip: "192.168.1.104"
    role: "Docker-based streaming stack (GPU passthrough)"
    status_name: "Media Stack"
    docs: services/media-stack/README.md
    band: media-streaming

  - vmid: 105
    name: playground-controller
    type: lxc
    ip: "192.168.1.105"
    role: "Playground session controller (dual-homed: vmbr0 + vmbr_sandbox)"
    status_name: "Playground Controller"
    docs: services/playground-controller/README.md
    band: core-network
    created: "2026-07-06"

  - vmid: 180
    name: sandbox-template-playground
    type: lxc
    ip: null
    role: "Golden template for playground sessions — a Proxmox template, not run directly"
    status_name: "Playground Template"
    docs: services/playground-controller/README.md
    band: sandboxes-testing
    created: "2026-06-19"
    # A Proxmox template, not a running service: no IP, no live status.
    # The site shows it in the services catalog and the VMID band diagram
    # (labelled as a template), but excludes it from live/runtime views
    # and the "active containers" count.
    template: true

overlay:
  - id: tailscale-proxmox
    name: "Tailscale (Proxmox)"
    ip: "100.87.172.121"
    type: overlay
    role: "Remote access mesh VPN"
    vmid: null
    docs: networking/tailscale-routing.md

vmid_bands:
  - id: core-network
    range: "100-119"
    label: "Core Network Layer"
    purpose: "DNS, reverse proxies, VPN gateways, core firewalls"
    isolation: lxc
  - id: automation-utilities
    range: "120-139"
    label: "Automation & Utilities"
    purpose: "Home Assistant DB backends, analytics nodes, cron pipelines"
    isolation: lxc
  - id: specialized-controllers
    range: "140-159"
    label: "Specialized Core Controllers"
    purpose: "Primary home controllers requiring kernel isolation"
    isolation: qemu-vm
  - id: media-streaming
    range: "160-179"
    label: "Media & Streaming Stacks"
    purpose: "Video streaming servers, media indexers, transcoder controllers"
    isolation: lxc-gpu-passthrough
  - id: sandboxes-testing
    range: "180-199"
    label: "Sandboxes & Testing"
    purpose: "Local AI playgrounds, testing sandboxes, experimental environments"
    isolation: lxc-or-vm
